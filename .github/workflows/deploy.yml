name: Deploy Godot 4.6 Game to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      # Bước 1: Cài đặt đúng phiên bản Godot và Export Templates tương ứng
      - name: Setup Godot Engine
        uses: chickenmesh/setup-godot@v2
        with:
          version: "4.6" # Bạn có thể ghi rõ 4.6.stable hoặc hệ thống tự lấy bản ổn định nhất của 4.6
          use-mono: false

      # Bước 2: Tạo thư mục build và chạy lệnh Export gốc của Godot 4
      - name: Build Godot Project (Web)
        run: |
          mkdir -p build
          godot --headless --export-release "Web" build/index.html

      # Bước 3: Đẩy sản phẩm lên GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
