name: Deploy Godot 4.6 Game to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build Godot 4.6 Project (Web)
        uses: firebelley/godot-export@v5.2.1
        with:
          # Chỉ định chính xác phiên bản Godot 4.6 của bạn
          godot_version: "4.6" 
          # Từ Godot 4, preset mặc định cho Web được gọi là "Web" (thay vì HTML5)
          export_preset_name: "Web" 
          export_output_path: "build/index.html"
          export_as_debug: false

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
