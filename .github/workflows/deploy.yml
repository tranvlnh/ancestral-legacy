name: Deploy Godot 4.6 Game directly to GitHub Pages

on:
  push:
    branches: [main]

# Cấp quyền bắt buộc để GitHub Actions có thể xác thực và ghi dữ liệu lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export_game:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Export Godot 4.6 Project (Web)
        id: export
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          presets_to_export: Web

      # Đóng gói và tải thư mục Web lên máy chủ trung gian của GitHub Actions
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.export.outputs.build_directory }}/Web

  # Job mới: Nhận gói dữ liệu và xuất bản lên GitHub Pages
  deploy_pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export_game # Đảm bảo chỉ deploy sau khi đã xuất game thành công
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
